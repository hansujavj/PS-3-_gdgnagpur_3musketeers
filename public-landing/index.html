<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AgriChain - Connecting farmers, buyers, and logistics for a transparent, trustable, and traceable agricultural supply chain.">
    <title>AgriChain App</title>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Background overlay elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- Main Container wrapping the iPhone Mockup -->
    <main class="app-container">
        <div class="iphone-mockup" id="phone-container">
            <!-- Dynamic Island Notch -->
            <div class="dynamic-island"></div>
            
            <!-- Side Buttons -->
            <div class="side-button volume-up"></div>
            <div class="side-button volume-down"></div>
            <div class="side-button action-btn"></div>
            <div class="side-button power-btn"></div>

            <!-- Screen Frame -->
            <div class="iphone-screen">
                <!-- Embedded React Native Web App -->
                <iframe src="/app/" title="AgriChain Mobile App Demonstration" class="app-iframe" id="app-demo-iframe" loading="lazy"></iframe>
            </div>

            <!-- Speaker grill & camera dots in notch -->
            <div class="camera-lens"></div>
        </div>
    </main>
</body>
</html>
